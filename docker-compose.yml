services:
  cloudflare-bypass:
    build: .
    container_name: cloudflare-bypass
    ports:
      - "8005:8005"
    environment:
      - WORKERS=3
      - API_TOKEN=${API_TOKEN:?API_TOKEN must be set in .env or environment}
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "0.5"
    shm_size: 2g
    restart: unless-stopped
